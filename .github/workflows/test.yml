name: Run tests

on: [push, pull_request, workflow_call]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install 
      - run: pnpm build
      - run: pnpm test
