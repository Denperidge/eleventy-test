name: Publish package on npm & GitHub

on:
  push:
    tags:
      - "*.*.*"

jobs:
  test:
    uses: ./.github/workflows/test.yml
  github-release:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install 
      - run: pnpm build
      - uses: ncipollo/release-action@v1.20.0
        with:
          artifacts: dist/index.js

  npm-publish:
    runs-on: ubuntu-latest
    needs: [test]
    # See https://docs.npmjs.com/trusted-publishers#github-actions-configuration
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"
      - run: pnpm install 
      - run: pnpm build
      - run: npm publish
